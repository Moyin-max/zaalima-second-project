<!-- TopNavBar -->
<header class="bg-[#09090B] dark:bg-[#09090B] docked full-width top-0 z-50 border-b border-[#27272A] dark:border-[#27272A] flat no shadows">
<div class="flex justify-between items-center h-14 px-6 w-full max-w-full mx-auto font-['Space_Grotesk'] text-sm tracking-tight">
<div class="flex items-center gap-8">
<a class="text-xl font-bold tracking-tighter text-white dark:text-white" href="/">Extensio.ai</a>
<nav class="hidden md:flex gap-6">
<a class="text-[#A1A1AA] dark:text-[#A1A1AA] hover:text-white transition-colors" href="#">Dashboard</a>
<a class="text-[#A1A1AA] dark:text-[#A1A1AA] hover:text-white transition-colors" href="#">Pricing</a>
<a class="text-[#A1A1AA] dark:text-[#A1A1AA] hover:text-white transition-colors" href="#">Docs</a>
</nav>

<a class="text-[#A1A1AA] dark:text-[#A1A1AA] hover:text-white transition-colors cursor-pointer text-sm font-['Space_Grotesk'] active:scale-95 duration-100" href="#">Login</a>
<a class="text-white dark:text-white border-b-2 border-blue-500 pb-1 text-sm font-['Space_Grotesk'] active:scale-95 duration-100" href="#">Sign up</a>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Asymmetric Glow Background Decor -->
<div class="absolute -z-10 blur-[120px] opacity-20 pointer-events-none">
<div class="bg-primary-container w-[400px] h-[400px] rounded-full -translate-x-1/2 -translate-y-1/2"></div>
</div>
<div class="bg-[#18181B] border border-[#27272A] p-8 md:p-10 rounded-lg relative overflow-hidden">
<div class="mb-8">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Create an account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your details to get started with Extensio.ai</p>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="name">Full Name</label>
<input class="w-full bg-[#09090B] border border-[#27272A] rounded px-4 py-3 text-on-surface font-body-base text-body-base focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-[#3F3F46]" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full bg-[#09090B] border border-[#27272A] rounded px-4 py-3 text-on-surface font-body-base text-body-base focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-[#3F3F46]" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
</div>
<input class="w-full bg-[#09090B] border border-[#27272A] rounded px-4 py-3 text-on-surface font-body-base text-body-base focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-[#3F3F46]" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container hover:bg-[#6fa0ff] text-on-primary-container font-headline-md text-body-base py-3 rounded-lg transition-all active:scale-[0.98] mt-4 font-semibold" type="submit">
                        Create Account
                    </button>
</form>
<div class="mt-8 pt-6 border-t border-[#27272A] flex flex-col items-center gap-4">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary hover:underline font-medium" href="#">Login</a>
</p>
</div>
</div>
<!-- Technical Tag Decoration -->
<div class="mt-6 flex justify-center gap-2">
<span class="bg-primary/10 text-primary px-2 py-1 rounded font-code-snippet text-[10px] uppercase tracking-widest border border-primary/20">v1.2.4-stable</span>
<span class="bg-tertiary/10 text-tertiary px-2 py-1 rounded font-code-snippet text-[10px] uppercase tracking-widest border border-tertiary/20">Secure-Auth-Protocol</span>
